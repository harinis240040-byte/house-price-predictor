<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header text-center">
        <h1>🏠 Smart House Price Predictor</h1>
        <p>Machine Learning Based Price Estimation</p>
    </div>

    <!-- Form -->
    <div class="card form-card shadow-lg">
        <form action="/predict" method="post">

            <input type="number" name="area" placeholder="Area (sq ft)" required>
            <input type="number" name="bedrooms" placeholder="Bedrooms" required>
            <input type="number" name="bathrooms" placeholder="Bathrooms" required>

            <button class="btn-predict">Predict Price</button>
        </form>
    </div>

    {% if prediction %}

    <!-- Result -->
    <div class="card result-card shadow-lg">
        <h4>Estimated Price</h4>
        <h1 class="price">₹ {{prediction}}</h1>
    </div>

    <!-- Chart -->
    <div class="card chart-card shadow-lg">
        <h5 class="text-center">Area vs Price</h5>
        <canvas id="chart"></canvas>
    </div>

    <script>
    const areas = {{ areas | tojson }};
    const prices = {{ prices | tojson }};

    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: areas,
            datasets: [{
                label: 'Price',
                data: prices,
                borderWidth: 3,
                tension: 0.4
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: {
                        color: 'white'
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: 'white' }
                },
                y: {
                    ticks: { color: 'white' }
                }
            }
        }
    });
    </script>

    {% endif %}

</div>

</body>
</html>
